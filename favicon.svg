<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#4f46e5"/>

  <!-- Open book -->
  <g fill="white">
    <!-- Left page -->
    <path d="M5 9 L14 7 L14 22 L5 24 Z" opacity="0.95"/>
    <!-- Right page -->
    <path d="M27 9 L18 7 L18 22 L27 24 Z" opacity="0.95"/>
    <!-- Spine -->
    <rect x="15" y="7" width="2" height="15" rx="1"/>

    <!-- Left page text lines -->
    <rect x="7" y="11" width="5" height="1.2" rx="0.6" opacity="0.5"/>
    <rect x="7" y="14" width="5" height="1.2" rx="0.6" opacity="0.5"/>
    <rect x="7" y="17" width="4" height="1.2" rx="0.6" opacity="0.5"/>
    <rect x="7" y="20" width="3" height="1.2" rx="0.6" opacity="0.5"/>

    <!-- Right page text lines -->
    <rect x="20" y="11" width="5" height="1.2" rx="0.6" opacity="0.5"/>
    <rect x="20" y="14" width="5" height="1.2" rx="0.6" opacity="0.5"/>
    <rect x="20" y="17" width="4" height="1.2" rx="0.6" opacity="0.5"/>
    <rect x="20" y="20" width="3" height="1.2" rx="0.6" opacity="0.5"/>
  </g>

  <!-- Sound waves (TTS indicator) -->
  <g stroke="#818cf8" stroke-width="1.8" fill="none" stroke-linecap="round">
    <path d="M23 13 Q25 15.5 23 18" opacity="0.9"/>
    <path d="M25.5 11 Q29 15.5 25.5 20" opacity="0.7"/>
  </g>
</svg>