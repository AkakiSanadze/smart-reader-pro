<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="ინტერაქტიული ტექსტის წამკითხველი აპლიკაცია">
    <title>Smart Reader Pro</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- URL Modal -->
    <div class="modal-overlay" id="url-modal">
        <div class="modal">
            <h3>URL-დან წაკითხვა</h3>
            <input type="url" id="url-input" placeholder="https://example.com/article">
            <div class="modal-actions">
                <button class="cancel-btn" onclick="closeUrlModal()">გაუქმება</button>
                <button class="confirm-btn" id="fetch-url-btn" onclick="fetchFromUrl()">წაკითხვა</button>
            </div>
        </div>
    </div>

    <!-- Landing View -->
    <div id="landing" class="view">
        <header>
            <div class="header-left">
                <h1>Smart Reader</h1>
                <p class="subtitle">ტექსტის წამკითხველი</p>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="თემის შეცვლა">
                <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </header>

        <main>
            <!-- Continue Reading Card -->
            <div id="continue-card" class="continue-card hidden" onclick="continueReading()">
                <div class="info">
                    <div class="title">გააგრძელე კითხვა</div>
                    <div class="preview" id="continue-preview"></div>
                    <div class="progress-text" id="continue-progress"></div>
                </div>
                <button type="button" class="close-btn" onclick="event.stopPropagation(); clearProgress()" aria-label="დახურვა">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- Text Input -->
            <textarea id="text-input" placeholder="ჩასვით ტექსტი აქ..."></textarea>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" onclick="pasteFromClipboard()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    ჩაკრება
                </button>
                <button class="quick-btn" onclick="openUrlModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    URL-დან
                </button>
                <button class="quick-btn" onclick="clearInput()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    გასუფთავება
                </button>
            </div>

            <!-- Controls -->
            <div class="controls">
                <select id="voice-select">
                    <option value="auto">ავტომატური ხმა</option>
                </select>

                <div class="speed-control">
                    <label for="speed-slider">სიჩქარე:</label>
                    <input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="1">
                    <span id="speed-value">1x</span>
                </div>
            </div>

            <button id="start-btn" class="primary-btn" onclick="startReading()">დაწყება</button>

            <!-- History Section -->
            <div class="history-section" id="history-section">
                <h3>
                    <span>ისტორია</span>
                    <button onclick="clearHistory()">გასუფთავება</button>
                </h3>
                <div class="history-list" id="history-list"></div>
            </div>
        </main>
    </div>

    <!-- Reader View -->
    <div id="reader" class="view hidden">
        <header>
            <div class="header-left">
                <button id="back-btn" class="icon-btn" onclick="exitReader()" aria-label="უკან">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <button id="save-btn" class="icon-btn" onclick="saveCurrentText()" aria-label="შენახვა">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                </button>
                <button id="bookmark-btn" class="icon-btn bookmark-btn" onclick="toggleBookmark()" aria-label="სანიშნე">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                    </svg>
                </button>
            </div>
            <span id="slide-counter">1 / 1</span>
            <div class="header-right">
                <button id="focus-btn" class="icon-btn focus-btn" onclick="toggleFocusMode()" aria-label="ფოკუს რეჟიმი">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
                <button id="fullscreen-btn" class="icon-btn" onclick="toggleFullscreen()" aria-label="სრული ეკრანი">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
                    </svg>
                </button>
                <button id="reader-theme-toggle" class="icon-btn" onclick="toggleTheme()" aria-label="თემის შეცვლა">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <main class="slide-container" onclick="handleSlideContainerClick(event)">
            <p id="slide-text"></p>
        </main>

        <footer>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar" onclick="seekToPosition(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="nav-controls">
                <button id="prev-btn" class="nav-btn" onclick="prevSlide()" aria-label="წინა">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>

                <button id="play-btn" class="play-btn" onclick="togglePlay()" aria-label="დაკვრა">
                    <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <button id="next-btn" class="nav-btn" onclick="nextSlide()" aria-label="შემდეგი">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="storage.js"></script>
    <script src="tts.js"></script>
    <script src="text-processor.js"></script>
    <script src="ui.js"></script>
    <script src="reader.js"></script>
    <script src="handlers.js"></script>
    <script src="app.js"></script>
    <script>
        // Check if we're running on HTTP/HTTPS (not file://)
        function isHttpProtocol() {
            return window.location.protocol === 'http:' || window.location.protocol === 'https:';
        }

        // Conditionally add manifest link
        if (isHttpProtocol()) {
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = 'manifest.json';
            document.head.appendChild(manifestLink);
        }

        // Register Service Worker for PWA (only on HTTP/HTTPS)
        if (isHttpProtocol() && 'serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
